<app-skeleton-loader *ngIf="isLoading" [rows]="4" [columns]="1"></app-skeleton-loader>

<div *ngIf="!isLoading" class="container py-4 bg-light min-vh-100">
  <!-- Header con botón volver -->
  <app-back-button [title]="title"></app-back-button>

  <!-- Card Principal del Inmueble -->
  <div class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body p-4">
      <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
          <!-- Badge dinámico según el 'tipo' de la URL -->
          <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center mb-3"
            style="width: 60px; height: 60px;">
            <i [class]="propiedad?.icono" class="fs-3"></i>
          </div>
          <h1 class="h3 fw-bold mb-1">{{ propiedad?.edificio }}</h1>
          <p class="text-muted mb-0">
            <i class="fas fa-layer-group me-2"></i>Piso {{ propiedad?.piso }} - {{ propiedad?.letra }}
          </p>
        </div>
        <div class="text-end">
          <h2 class="text-primary fw-bold mb-0">${{ propiedad?.montoMensual | currency:'Bs.':'symbol':'1.2-2'}}</h2>
          <small class="text-muted text-uppercase fw-bold" style="font-size: 0.7rem;">Renta Sugerida</small>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm rounded-4 mb-4 border-start border-4" 
     [ngClass]="propiedad?.montoMensual! > 0 ? 'border-success' : 'border-warning'">
  <div class="card-body d-flex align-items-center py-3">
    <div [ngClass]="propiedad?.montoMensual! > 0 ? 'bg-success-light text-success' : 'bg-warning-light text-warning'" 
         class="rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 45px; height: 45px;">
      <i [class]="propiedad?.montoMensual! > 0 ? 'fas fa-check-circle' : 'fas fa-exclamation-circle'"></i>
    </div>
    <div class="flex-grow-1">
      <h6 class="fw-bold mb-0">Estado de Cuenta</h6>
      <small class="text-muted">Propiedad solvente este mes</small>
    </div>
    <div class="text-end">
      <span class="badge rounded-pill" [ngClass]="propiedad?.montoMensual! > 0 ? 'bg-success' : 'bg-warning text-dark'">
        {{ propiedad?.montoMensual! > 0 ? 'AL DÍA' : 'PENDIENTE' }}
      </span>
    </div>
  </div>
</div>
  <!-- Botones de Acción -->
  <div class="d-grid gap-3 mt-5">
  <button class="btn btn-primary rounded-pill py-3 fw-bold shadow-sm" (click)="reportarPago(propiedad?._id)">
    <i class="fas fa-receipt me-2"></i>Reportar Pago Mensual
  </button>
  <button class="btn btn-outline-secondary rounded-pill py-3 fw-bold" (click)="verHistorial()">
    <i class="fas fa-history me-2"></i>Ver Historial de Recibos
  </button>
</div>
</div>
