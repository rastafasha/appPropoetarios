<app-header></app-header>
<div class="container mt-4 pb-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0 text-dark">Mis Facturas</h4>
    <span class="badge bg-light text-primary border border-primary">2026</span>
  </div>

  <!-- Buscador rápido (Opcional pero muy útil) -->
  <div class="input-group mb-4 shadow-sm">
    <span class="input-group-text bg-white border-end-0 text-muted">
      <i class="bi bi-search"></i>
    </span>
    <input type="text" class="form-control border-start-0 ps-0" placeholder="Buscar mes o monto...">
  </div>

  <!-- Item de Factura: Marzo -->
  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body d-flex align-items-center">
      <!-- Icono de PDF -->
      <div class="bg-danger bg-opacity-10 p-3 rounded-3 me-3">
        <i class="bi bi-file-earmark-pdf-fill text-danger fs-3"></i>
      </div>
      
      <div class="flex-grow-1">
        <h6 class="mb-0 fw-bold">Factura Marzo 2026</h6>
        <p class="mb-0 text-muted small">Monto: <span class="fw-bold text-dark">Bs. 1.200,00</span></p>
        <small class="text-secondary" style="font-size: 0.75rem;">Generada el: 05/03/2026</small>
      </div>

      <!-- Botón de Acción -->
      <button class="btn btn-outline-primary btn-sm rounded-pill px-3">
        <i class="bi bi-download me-1"></i> Ver
      </button>
    </div>
  </div>

  <!-- Item de Factura: Febrero -->
  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body d-flex align-items-center opacity-75">
      <div class="bg-secondary bg-opacity-10 p-3 rounded-3 me-3">
        <i class="bi bi-file-earmark-check-fill text-secondary fs-3"></i>
      </div>
      
      <div class="flex-grow-1">
        <h6 class="mb-0 fw-bold text-dark">Factura Febrero 2026</h6>
        <p class="mb-0 text-muted small">Monto: <span class="fw-bold text-dark">Bs. 950,00</span></p>
        <small class="text-secondary" style="font-size: 0.75rem;">Generada el: 02/02/2026</small>
      </div>

      <button class="btn btn-light btn-sm rounded-pill px-3 border">
        <i class="bi bi-download me-1"></i> Ver
      </button>
    </div>
  </div>

</div>

<app-menufooter></app-menufooter>
